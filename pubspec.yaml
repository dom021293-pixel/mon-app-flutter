# ============================================
# CONFIGURATION DES ICÔNES DE L'APPLICATION
# ============================================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/joe.png"
  adaptive_icon_background: "#8B4513"
  adaptive_icon_foreground: "images/joe.png"
  remove_alpha_ios: true

# ============================================
# CONFIGURATION DE L'ÉCRAN DE DÉMARRAGE
# ============================================
flutter_native_splash:
  color: "#8B4513"
  image: "images/joe.png"
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  fullscreen: true